<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarHub — Заявка</title>
    <!-- Иконка и стили (Bootstrap + кастом) -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ШАПКА: Единая навигация для всего сайта -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="img/logo_white.png" alt="Logo" height="30" class="me-2">
                    <span class="fw-bold text-uppercase">CarHub</span>
                </a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Main</a></li>
                        <li class="nav-item"><a class="nav-link" href="list.html">List</a></li>
                        <li class="nav-item"><a class="nav-link active" href="form.html">Form</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- СТРАНИЦА С ФОРМОЙ: Реализация обратной связи (Заявка на автомобиль) -->
    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <!-- Карточка формы с закругленными углами (rounded-4) и тенью (shadow) -->
                <div class="card shadow border-0 p-4 rounded-4">
                    <h2 class="text-center mb-4 fw-bold">Оставить заявку</h2>
                    
                    <!-- Форма отправки данных. Атрибут required обеспечивает базовую валидацию HTML5 -->
                    <form id="orderForm">
                        <!-- Поле ввода имени -->
                        <div class="mb-3">
                            <label for="userName" class="form-label">Ваше имя</label>
                            <input type="text" class="form-control bg-light" id="userName" placeholder="Имя" required>
                        </div>
                        <!-- Поле ввода номера телефона -->
                        <div class="mb-3">
                            <label for="userPhone" class="form-label">Телефон</label>
                            <input type="tel" class="form-control bg-light" id="userPhone" placeholder="+7" required>
                        </div>
                        <!-- Поле ввода электронной почты -->
                        <div class="mb-3">
                            <label for="userEmail" class="form-label">Email</label>
                            <input type="email" class="form-control bg-light" id="userEmail" placeholder="email@test.com" required>
                        </div>
                        <!-- Кнопка отправки формы (Submit) -->
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark btn-lg fw-bold">ОТПРАВИТЬ</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- ПОДВАЛ: Авторские права и название проекта -->
    <footer class="bg-dark text-white py-3 text-center">
        <p class="mb-0 small text-secondary">&copy; 2026 CarHub. Лабораторная работа №2</p>
    </footer>

    <!-- Подключение скриптов: Bootstrap Bundle и будущий файл script.js для ЛР №3 -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="script.js"></script>
</body>
</html>
